  {tab:"для жизни",cat:"быт",title:"Распланировать день",text:"Помоги распланировать мой день. Вот мои задачи: [список]. Время с [от] до [до]. Расставь приоритеты и предложи порядок."},
  {tab:"для жизни",cat:"быт",title:"Разобраться с поломкой",text:"У меня сломалось [что]. Симптомы: [опиши]. Подскажи возможные причины и что можно попробовать починить самому до вызова мастера."},
  {tab:"для жизни",cat:"быт",title:"Сравнить товары",text:"Помоги выбрать между [товар 1] и [товар 2]. Моя задача: [для чего]. Бюджет: [сумма]. Что важнее учесть при выборе?"},
  {tab:"для жизни",cat:"быт",title:"Собрать чемодан",text:"Я еду в [куда] на [сколько дней]. Погода: [опиши]. Цель поездки: [отдых/работа/другое]. Составь список что взять, ничего важного не забыть."},
  {tab:"для жизни",cat:"быт",title:"Написать объявление",text:"Напиши объявление о продаже [что]. Характеристики: [опиши]. Цена: [сумма]. Текст должен быть коротким, честным и привлекательным."},
  {tab:"для жизни",cat:"быт",title:"Разобраться с коммуналкой",text:"Объясни мне эту строку в квитанции ЖКХ: [что непонятно]. Почему так начисляется и имею ли я право это оспорить?"},
  {tab:"для жизни",cat:"быт",title:"Придумать меню на праздник",text:"Помоги составить меню для [праздник] на [кол-во гостей]. Бюджет: [сумма]. Учти что среди гостей есть [особенности: вегетарианцы/дети/другое]."},
  {tab:"для жизни",cat:"быт",title:"Организовать переезд",text:"Мне предстоит переезд. Составь чеклист — что сделать за месяц, за неделю, за день и в день переезда."},
  {tab:"для жизни",cat:"быт",title:"Найти подешевле",text:"Я хочу купить [что]. Бюджет: [сумма]. Подскажи на что обращать внимание при выборе и как найти лучшее соотношение цена/качество."},
  // ЗДОРОВЬЕ
  {tab:"для жизни",cat:"здоровье",title:"Понять симптомы",text:"У меня есть следующие симптомы: [список]. Что это может быть? Объясни возможные причины и скажи когда точно стоит идти к врачу. Не ставь диагноз — только информация."},
  {tab:"для жизни",cat:"здоровье",title:"Составить тренировку",text:"Составь тренировку на [сколько минут] для [цель: похудение/тонус/сила] без специального оборудования. Уровень — начинающий."},
  {tab:"для жизни",cat:"здоровье",title:"Разобраться в анализах",text:"Объясни простыми словами что означают эти результаты анализов: [вставь результаты]. Какие показатели выходят за норму и стоит ли беспокоиться?"},
  {tab:"для жизни",cat:"здоровье",title:"Составить режим дня",text:"Помоги составить здоровый режим дня. Я встаю в [время], ложусь в [время], работаю/учусь с [время] до [время]. Учти сон, питание, движение."},
  {tab:"для жизни",cat:"здоровье",title:"Разобраться с питанием",text:"Я хочу питаться здоровее но не знаю с чего начать. Мои ограничения: [аллергии/предпочтения]. Дай 5 простых советов которые реально внедрить с завтрашнего дня."},
  {tab:"для жизни",cat:"здоровье",title:"Объяснить лекарство",text:"Объясни простыми словами для чего это лекарство и как правильно его принимать: [название]. На что обратить внимание и какие есть противопоказания?"},
  {tab:"для жизни",cat:"здоровье",title:"Подготовиться к врачу",text:"Я иду к врачу с проблемой: [опиши]. Какие вопросы стоит задать врачу? Что важно рассказать и о чём не забыть упомянуть?"},
  {tab:"для жизни",cat:"здоровье",title:"Улучшить сон",text:"Я плохо сплю — [опиши проблему: долго засыпаю/просыпаюсь ночью/другое]. Дай конкретные советы которые можно попробовать уже сегодня ночью."},
  {tab:"для жизни",cat:"здоровье",title:"Снизить вес",text:"Я хочу похудеть на [кол-во кг] за [срок]. Мой образ жизни: [опиши активность]. С чего начать и каких простых правил придерживаться?"},
  // ОБЩЕНИЕ
  {tab:"для жизни",cat:"общение",title:"Ответить на сложное сообщение",text:"Мне написали вот это: [сообщение]. Помоги составить ответ. Я хочу [что хочешь донести]. Тон должен быть [спокойным / уверенным / дружелюбным]."},
  {tab:"для жизни",cat:"общение",title:"Разрешить конфликт",text:"У меня конфликт с [кем]. Ситуация такая: [опиши]. Как мне лучше поговорить с этим человеком? Что сказать и чего избегать?"},
  {tab:"для жизни",cat:"общение",title:"Попросить об одолжении",text:"Мне нужно попросить [кого] о [что]. Помоги сформулировать просьбу так чтобы это звучало естественно и не неловко."},
  {tab:"для жизни",cat:"общение",title:"Познакомиться с человеком",text:"Хочу познакомиться с [кем: коллегой/соседом/человеком на мероприятии]. Предложи несколько естественных способов начать разговор без неловкости."},
  {tab:"для жизни",cat:"общение",title:"Отказать вежливо",text:"Мне нужно отказать [кому] в [чём]. Помоги сформулировать отказ так чтобы не обидеть человека и не испортить отношения."},
  {tab:"для жизни",cat:"общение",title:"Извиниться искренне",text:"Мне нужно извиниться перед [кем] за [что]. Помоги написать искреннее извинение которое не звучит как отговорка."},
  {tab:"для жизни",cat:"общение",title:"Дать обратную связь",text:"Мне нужно дать обратную связь [кому] по поводу [что]. Это нужно сказать честно но не обидно. Помоги сформулировать."},
  {tab:"для жизни",cat:"общение",title:"Написать в поддержку",text:"Помоги написать обращение в службу поддержки [компания]. Проблема: [опиши]. Текст должен быть чётким, вежливым и с конкретным запросом."},
  // ТВОРЧЕСТВО
  {tab:"для жизни",cat:"творчество",title:"Придумать подарок",text:"Помоги придумать подарок для [кому] на [повод]. Бюджет: [сумма]. Расскажи немного об этом человеке: [пару слов]. Предложи 5 вариантов от простого к оригинальному."},
  {tab:"для жизни",cat:"творчество",title:"Написать поздравление",text:"Напиши поздравление с [праздник] для [кому]. Тон — [весёлый / трогательный / официальный]. Не банальное, живое. 3-4 предложения."},
  {tab:"для жизни",cat:"творчество",title:"Придумать историю",text:"Придумай короткую историю (5-7 предложений) в жанре [жанр] с главным героем [кто]. Начало должно сразу захватывать."},
  {tab:"для жизни",cat:"творчество",title:"Придумать имя персонажу",text:"Придумай имя для персонажа: [пол], [возраст], [характер], [сеттинг: современность/фэнтези/другое]. Предложи 5 вариантов с объяснением почему каждое подходит."},
  {tab:"для жизни",cat:"творчество",title:"Написать пост в соцсети",text:"Напиши пост для [Instagram/ВКонтакте/Telegram] на тему '[тема]'. Тон — [живой/вдохновляющий/информационный]. Добавь призыв к действию в конце."},
  {tab:"для жизни",cat:"творчество",title:"Придумать сюжет",text:"Помоги придумать сюжет для [рассказ/игра/комикс]. Жанр: [опиши]. Главный герой: [кто]. Мне нужны: завязка, конфликт и неожиданный поворот."},
  {tab:"для жизни",cat:"творчество",title:"Написать биографию",text:"Напиши короткую биографию для [профиль/сайт/резюме]. Обо мне: [расскажи про себя]. Тон — [профессиональный/живой/с юмором]. Не больше 5 предложений."},
  {tab:"для жизни",cat:"творчество",title:"Придумать слоган",text:"Придумай 7 слоганов для [бренд/проект/мероприятие]. Суть: [опиши]. Слоганы должны быть короткими, запоминающимися и отражать главную идею."},
  // ДЕНЬГИ
  {tab:"для жизни",cat:"деньги",title:"Составить бюджет",text:"Помоги составить личный бюджет на месяц. Мой доход: [сумма]. Обязательные расходы: [список]. Хочу откладывать [сумма/цель]. Как распределить остаток?"},
  {tab:"для жизни",cat:"деньги",title:"Разобраться с кредитом",text:"Объясни простыми словами условия этого кредита/займа: [вставь условия]. Сколько я реально переплачу и на что обратить внимание перед подписанием?"},
  {tab:"для жизни",cat:"деньги",title:"Найти где сэкономить",text:"Вот мои траты за месяц: [список]. Где я трачу лишнее и как можно сэкономить без сильного ущерба для качества жизни?"},
  {tab:"для жизни",cat:"деньги",title:"Понять финансовый термин",text:"Объясни простыми словами что такое [термин: инфляция/вклад/акции/ипотека]. Как это влияет на обычного человека и стоит ли мне в это вникать?"},
  {tab:"для жизни",cat:"деньги",title:"Разобраться с налогами",text:"Объясни какие налоги я должен платить в ситуации: [опиши: фриланс/продажа имущества/другое]. Как это сделать правильно и есть ли законные способы снизить сумму?"},
  {tab:"для жизни",cat:"деньги",title:"Начать откладывать",text:"Я хочу начать откладывать деньги но не знаю как. Мой доход: [примерно]. Расходы покрывают почти всё. Дай реалистичный план с чего начать."},
  {tab:"для жизни",cat:"деньги",title:"Сравнить предложения банков",text:"Помоги сравнить эти предложения от банков: [вставь условия]. Что выгоднее и на что обратить внимание кроме процентной ставки?"},
  {tab:"для жизни",cat:"деньги",title:"Посчитать выгоду",text:"Помоги посчитать что выгоднее: [вариант 1] или [вариант 2]. Исходные данные: [опиши цифры]. Покажи расчёт по шагам."},
  // ЮРИДИЧЕСКОЕ
  {tab:"для жизни",cat:"юридическое",title:"Объяснить договор",text:"Объясни этот договор простыми словами. Какие пункты опасны или невыгодны для меня? На что обратить внимание перед подписанием: [вставь текст договора]"},
  {tab:"для жизни",cat:"юридическое",title:"Узнать свои права",text:"Опиши мои права в такой ситуации: [опиши]. Что я могу требовать, куда обратиться и что нельзя делать чтобы не навредить себе?"},
  {tab:"для жизни",cat:"юридическое",title:"Написать жалобу",text:"Помоги написать официальную жалобу в [организация] на [что]. Ситуация: [опиши]. Жалоба должна быть грамотной, конкретной и со ссылкой на права потребителя."},
  {tab:"для жизни",cat:"юридическое",title:"Разобраться с увольнением",text:"Меня хотят уволить / я хочу уволиться. Ситуация: [опиши]. Какие у меня права, что должен сделать работодатель и на что я могу рассчитывать?"},
  {tab:"для жизни",cat:"юридическое",title:"Проверить условия аренды",text:"Я собираюсь снять квартиру. Вот условия договора аренды: [вставь]. Что здесь подозрительно или невыгодно для меня как арендатора?"},
  {tab:"для жизни",cat:"юридическое",title:"Написать претензию",text:"Помоги написать официальную претензию [кому: магазин/сервис/компания]. Ситуация: [опиши]. Я хочу добиться [чего]. Текст должен быть чётким и со ссылкой на закон о защите прав потребителей."},
  {tab:"для жизни",cat:"юридическое",title:"Разобраться с наследством",text:"Объясни как работает наследство в ситуации: [опиши]. Какие у меня права, какие сроки и что нужно сделать в первую очередь?"},
  // ПСИХОЛОГИЯ
  {tab:"для жизни",cat:"психология",title:"Разобраться в ситуации",text:"Помоги разобраться в ситуации. [Опиши что произошло]. Почему человек мог так поступить и как мне на это реагировать? Смотри объективно, без осуждения."},
  {tab:"для жизни",cat:"психология",title:"Справиться со стрессом",text:"Я сейчас сильно стрессую из-за [причина]. Дай несколько конкретных техник которые помогут успокоиться прямо сейчас и справляться с этим дальше."},
  {tab:"для жизни",cat:"психология",title:"Побороть прокрастинацию",text:"Я постоянно откладываю [задачу]. Причина скорее всего: [страх/скука/непонимание с чего начать]. Помоги разобраться почему и дай конкретный план как начать сегодня."},
  {tab:"для жизни",cat:"психология",title:"Улучшить отношения",text:"Хочу улучшить отношения с [кем: партнёром/другом/родителем]. Проблема в том что [опиши]. Что я могу сделать со своей стороны и как начать этот разговор?"},
  {tab:"для жизни",cat:"психология",title:"Справиться с тревогой",text:"Я часто тревожусь о [чём]. Это мешает мне [как]. Дай практические техники которые помогают снизить тревогу и изменить отношение к ситуации."},
  {tab:"для жизни",cat:"психология",title:"Повысить уверенность",text:"Я чувствую себя неуверенно когда [ситуация]. Какие упражнения или привычки помогут мне стать увереннее в этом?"},
  {tab:"для жизни",cat:"психология",title:"Пережить расставание",text:"Я недавно расстался(ась) с [кем]. Мне тяжело потому что [опиши]. Помоги понять как справляться с этим и что делать прямо сейчас."},
  {tab:"для жизни",cat:"психология",title:"Поговорить с близким о проблеме",text:"Мне нужно поговорить с [кем] о том что [тема]. Я боюсь что [реакция]. Как начать этот разговор и что важно сказать чтобы меня услышали?"},
  // КОД
  {tab:"для программистов",cat:"код",title:"Найти баг",text:"В этом коде есть баг: [вставь код]. Симптом: [что происходит]. Найди причину и объясни почему это происходит, потом предложи исправление."},
  {tab:"для программистов",cat:"код",title:"Объяснить чужой код",text:"Объясни что делает этот код, строка за строкой. Особо остановись на неочевидных местах: [вставь код]"},
  {tab:"для программистов",cat:"код",title:"Написать функцию",text:"Напиши функцию на [язык] которая [что делает]. Входные данные: [опиши]. Выходные данные: [опиши]. Добавь комментарии и обработку крайних случаев."},
  {tab:"для программистов",cat:"код",title:"Отрефакторить код",text:"Отрефакторь этот код — улучши читаемость, убери дублирование, сделай структуру чище. Не меняй поведение. Объясни что изменил и почему: [вставь код]"},
  {tab:"для программистов",cat:"код",title:"Написать тесты",text:"Напиши юнит-тесты для этой функции на [фреймворк: pytest/jest/другой]. Покрой обычные случаи, граничные значения и ошибочный ввод: [вставь код]"},
  {tab:"для программистов",cat:"код",title:"Оптимизировать код",text:"Этот код работает медленно на больших данных: [вставь код]. Найди узкие места и предложи оптимизацию. Объясни почему твой вариант быстрее."},
  {tab:"для программистов",cat:"код",title:"Перевести на другой язык",text:"Переведи этот код с [язык1] на [язык2]. Сохрани логику, но используй идиоматичный стиль целевого языка: [вставь код]"},
  {tab:"для программистов",cat:"код",title:"Написать регулярное выражение",text:"Напиши регулярное выражение для [задача: валидация email/парсинг URL/другое]. Объясни каждую часть паттерна и покажи примеры строк которые совпадают и не совпадают."},
  {tab:"для программистов",cat:"код",title:"Разобрать алгоритм",text:"Объясни как работает алгоритм [название]. Покажи пример на простых данных по шагам. Какая у него сложность и когда стоит его применять?"},
  {tab:"для программистов",cat:"код",title:"Спроектировать структуру данных",text:"Мне нужно хранить и быстро искать [что]. Операции: [список]. Предложи подходящую структуру данных и объясни почему она лучше альтернатив."},
  {tab:"для программистов",cat:"код",title:"Написать SQL запрос",text:"Напиши SQL запрос для [задача]. Структура таблиц: [опиши]. Оптимизируй для больших данных и объясни логику джойнов."},
  {tab:"для программистов",cat:"код",title:"Разобрать ошибку",text:"Я получаю эту ошибку: [вставь текст ошибки]. Код: [вставь]. Окружение: [язык/фреймворк/версия]. Объясни причину и как исправить."},
  {tab:"для программистов",cat:"код",title:"Сделать code review",text:"Сделай code review этого кода. Найди проблемы с логикой, безопасностью, производительностью и стилем. Будь конкретен: [вставь код]"},
  {tab:"для программистов",cat:"код",title:"Написать документацию",text:"Напиши документацию для этого кода в формате [docstring/README/JSDoc]. Опиши что делает каждая функция, параметры и возвращаемые значения: [вставь код]"},

// Stable hash ID for each prompt (for share-links)
function hashId(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h).toString(36);}
data.forEach(d=>{
  d.id=hashId(d.title+d.text);
  // Compute unique placeholders in order of appearance
  const re=/\[([^\]]+)\]/g, seen=[]; let m;
  while((m=re.exec(d.text))!==null){if(!seen.includes(m[1]))seen.push(m[1]);}
  d.placeholders=seen;
});

// User-entered values for placeholders: {promptId: {placeholderIdx: value}}
const fillState={};

function escAttr(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/'/g,"&#39;")}
function escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

// Render prompt text with editable spans replacing [placeholders]
function renderPromptText(d){
  const state=fillState[d.id]||{};
  return d.text.replace(/\[([^\]]+)\]/g,(_,name)=>{
    const idx=d.placeholders.indexOf(name);
    const value=state[idx]!==undefined?state[idx]:"";
    return `<span class="ph" data-card="${d.id}" data-idx="${idx}" data-placeholder="${escAttr(name)}" contenteditable="true" oninput="setFill('${d.id}',${idx},this)">${escHtml(value)}</span>`;
  });
}

// Build final filled text for copy: substitute filled values, keep [name] for empty
function buildFilledText(d){
  const state=fillState[d.id]||{};
  return d.text.replace(/\[([^\]]+)\]/g,(orig,name)=>{
    const idx=d.placeholders.indexOf(name);
    const v=state[idx];
    return v&&v.trim()?v.trim():orig;
  });
}

// Update state and sync sibling placeholders with same idx in same card
function setFill(id,idx,source){
  const value=source.textContent;
  if(!fillState[id])fillState[id]={};
  fillState[id][idx]=value;
  document.querySelectorAll(`.ph[data-card="${id}"][data-idx="${idx}"]`).forEach(el=>{
    if(el!==source&&el.textContent!==value)el.textContent=value;
  });
}

const allTabs=["все",...new Set(data.map(d=>d.tab))];
function getCats(tab){return["все",...new Set(data.filter(d=>tab==="все"||d.tab===tab).map(d=>d.cat))];}

let activeTab="все",activeCat="все";

// LocalStorage helpers
function getCopies(){try{return JSON.parse(localStorage.getItem("copies")||"{}")}catch{return{}}}
function bumpCopies(id){const c=getCopies();c[id]=(c[id]||0)+1;localStorage.setItem("copies",JSON.stringify(c));return c[id]}
function getFavs(){try{return JSON.parse(localStorage.getItem("favs")||"[]")}catch{return[]}}
function isFav(id){return getFavs().includes(id)}
function toggleFav(id){const f=getFavs();const i=f.indexOf(id);if(i>=0)f.splice(i,1);else f.push(id);localStorage.setItem("favs",JSON.stringify(f));render()}

let onlyFavs=false;
function toggleFavFilter(){onlyFavs=!onlyFavs;render()}

// Theme
function applyTheme(theme){document.documentElement.setAttribute("data-theme",theme);document.getElementById("theme-toggle").textContent=theme==="dark"?"☀️":"🌙"}
function toggleTheme(){const cur=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";localStorage.setItem("theme",cur);applyTheme(cur)}
applyTheme(localStorage.getItem("theme")||(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"));

function getFiltered(){
  const q=document.getElementById("q").value.toLowerCase();
  return data.filter(d=>
    (activeTab==="все"||d.tab===activeTab)&&
    (activeCat==="все"||d.cat===activeCat)&&
    (!onlyFavs||isFav(d.id))&&
    (d.title.toLowerCase().includes(q)||d.text.toLowerCase().includes(q))
  );
}

function render(){
  const filtered=getFiltered();
  const copies=getCopies();
  document.getElementById("tabs").innerHTML=allTabs.map(t=>
    `<div class="tab${activeTab===t?" active":""}" onclick="setTab('${t}')">${t}</div>`
  ).join("");
  document.getElementById("cats").innerHTML=getCats(activeTab).map(c=>{
    const icon=CATEGORY_ICONS[c]||"";
    return `<div class="cat${activeCat===c?" active":""}" onclick="setCat('${c}')">${c==="все"?"все категории":icon+" "+c}</div>`;
  }).join("");
  document.getElementById("count").textContent=`Промптов: ${filtered.length}`;
  document.getElementById("fav-filter-btn").classList.toggle("active",onlyFavs);
  const cards=document.getElementById("cards");
  if(!filtered.length){
    const msg=onlyFavs?"В избранном пока пусто — нажми ☆ на любом промпте чтобы добавить":"Ничего не найдено";
    cards.innerHTML=`<div class="empty">${msg}</div>`;return;
  }
  cards.innerHTML=filtered.map(d=>{
    const n=copies[d.id]||0;
    const icon=CATEGORY_ICONS[d.cat]||"";
    const fav=isFav(d.id);
    return `<div class="card" id="card-${d.id}">
    <div class="card-top"><span class="card-title">${d.title}</span><span class="badge ${d.cat}">${icon} ${d.cat}</span></div>
    <div class="card-text">${renderPromptText(d)}</div>
    <div class="card-actions">
      <span class="copies">${n>0?`скопировано ${n}`:""}</span>
      <div class="btn-row">
        <button class="fav-btn ${fav?'active':''}" onclick="toggleFav('${d.id}')" title="В избранное">${fav?'★':'☆'}</button>
        <button class="action-btn" id="share-${d.id}" onclick="share('${d.id}')">поделиться</button>
        <button class="action-btn" id="copy-${d.id}" onclick="copyPrompt('${d.id}')">копировать</button>
      </div>
    </div>
  </div>`;
  }).join("");
}

function setTab(t){activeTab=t;activeCat="все";render()}
function setCat(c){activeCat=c;render()}

function copyPrompt(id){
  const d=data.find(x=>x.id===id);
  if(!d)return;
  navigator.clipboard.writeText(buildFilledText(d));
  const n=bumpCopies(id);
  const card=document.getElementById("card-"+id);
  const btn=document.getElementById("copy-"+id);
  const counter=card.querySelector(".copies");
  counter.textContent=`скопировано ${n}`;
  btn.textContent="скопировано ✓";
  btn.classList.add("success");
  setTimeout(()=>{btn.textContent="копировать";btn.classList.remove("success")},1500);
}

function share(id){
  const url=location.origin+location.pathname+"#"+id;
  navigator.clipboard.writeText(url);
  const btn=document.getElementById("share-"+id);
  btn.textContent="ссылка ✓";
  btn.classList.add("success");
  setTimeout(()=>{btn.textContent="поделиться";btn.classList.remove("success")},1500);
}

function randomPrompt(){
  const filtered=getFiltered();
  if(!filtered.length)return;
  const r=filtered[Math.floor(Math.random()*filtered.length)];
  jumpTo(r.id);
}

function jumpTo(id){
  const el=document.getElementById("card-"+id);
  if(!el)return;
  el.scrollIntoView({behavior:"smooth",block:"center"});
  el.classList.add("flash");
  setTimeout(()=>el.classList.remove("flash"),1500);
}

render();

// Handle hash on load (shared links)
if(location.hash){
  const id=location.hash.slice(1);
  setTimeout(()=>jumpTo(id),100);
}
</script>
