<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Библиотека промптов</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;min-height:100vh;padding:2rem 1rem;color:#1a1a18}
  .container{max-width:960px;margin:0 auto}
  h1{font-size:28px;font-weight:600;margin-bottom:0.25rem;color:#1a1a18}
  .subtitle{font-size:15px;color:#6b6b68;margin-bottom:1.5rem}
  .tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
  .tab{padding:7px 16px;border-radius:20px;border:1px solid #d5d4d0;font-size:13px;cursor:pointer;background:#fff;color:#6b6b68;transition:all 0.15s;font-weight:500;user-select:none}
  .tab.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
  .tab:hover:not(.active){background:#efefec}
  .search-row{margin-bottom:1rem}
  .search-row input{width:100%;padding:11px 16px;border:1px solid #d5d4d0;border-radius:12px;background:#fff;font-size:14px;outline:none;color:#1a1a18;transition:border 0.15s}
  .search-row input:focus{border-color:#888}
  .cats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
  .cat{padding:5px 13px;border-radius:20px;border:1px solid #d5d4d0;font-size:13px;cursor:pointer;background:#fff;color:#6b6b68;transition:all 0.15s;user-select:none}
  .cat.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
  .cat:hover:not(.active){background:#efefec}
  .count{font-size:13px;color:#aaa;margin-bottom:1rem}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
  .card{background:#fff;border:1px solid #e8e7e3;border-radius:14px;padding:1rem 1.25rem;display:flex;flex-direction:column;gap:10px;transition:box-shadow 0.15s}
  .card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.07)}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .card-title{font-size:13px;font-weight:500;color:#6b6b68}
  .badge{font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;font-weight:500}
  .card-text{font-size:13px;color:#1a1a18;line-height:1.6;flex:1}
  .copy-btn{align-self:flex-end;padding:5px 13px;font-size:12px;border-radius:8px;border:1px solid #d5d4d0;background:transparent;cursor:pointer;color:#6b6b68;transition:all 0.15s;font-weight:500}
  .copy-btn:hover{background:#f5f4f0}
  .copy-btn.copied{color:#1D9E75;border-color:#1D9E75}
  .empty{text-align:center;padding:4rem;color:#aaa;font-size:14px;grid-column:1/-1}
  .badge.учёба{background:#E6F1FB;color:#185FA5}
  .badge.работа{background:#EEEDFE;color:#534AB7}
  .badge.быт{background:#EAF3DE;color:#3B6D11}
  .badge.здоровье{background:#FAEEDA;color:#854F0B}
  .badge.общение{background:#FBEAF0;color:#993556}
  .badge.творчество{background:#FAECE7;color:#712B13}
  .badge.деньги{background:#EAF3DE;color:#185FA5}
  .badge.юридическое{background:#F1EFE8;color:#444441}
  .badge.психология{background:#FBEAF0;color:#72243E}
  .badge.код{background:#1a1a18;color:#f5f4f0}
  .badge.карьера{background:#EEEDFE;color:#3C3489}
</style>
</head>
<body>
<div class="container">
  <h1>Библиотека промптов</h1>
  <p class="subtitle">Готовые шаблоны — скопировал, вставил в ИИ, получил результат</p>
  <div class="tabs" id="tabs"></div>
  <div class="search-row"><input type="text" id="q" placeholder="Поиск промпта..." oninput="render()"></div>
  <div class="cats" id="cats"></div>
  <div class="count" id="count"></div>
  <div class="cards" id="cards"></div>
</div>
<script>
const data=[
  // УЧЁБА
  {tab:"для всех",cat:"учёба",title:"Объяснить тему просто",text:"Объясни мне [тема] так, будто мне 15 лет и я слышу это впервые. Используй аналогии из повседневной жизни."},
  {tab:"для всех",cat:"учёба",title:"Составить план обучения",text:"Я хочу выучить [навык/тема] с нуля. Составь пошаговый план на 4 недели: что изучать, в каком порядке, сколько времени в день."},
  {tab:"для всех",cat:"учёба",title:"Подготовиться к экзамену",text:"Помоги мне подготовиться к экзамену по [предмет]. Задавай мне вопросы по одному, жди ответа, потом говори правильно я ответил или нет."},
  {tab:"для всех",cat:"учёба",title:"Перевести и объяснить текст",text:"Переведи этот текст на русский и объясни все сложные термины простыми словами: [вставь текст]"},
  {tab:"для всех",cat:"учёба",title:"Найти ошибки в тексте",text:"Проверь мой текст на ошибки. Исправь грамматику, пунктуацию и стиль. Объясни каждое исправление. Вот текст: [вставь текст]"},
  {tab:"для всех",cat:"учёба",title:"Написать эссе",text:"Помоги написать эссе на тему '[тема]'. Объём — [кол-во слов]. Структура: введение, 2-3 аргумента с примерами, вывод. Стиль — академический но живой."},
  {tab:"для всех",cat:"учёба",title:"Разобрать задачу",text:"Я не понимаю как решить эту задачу: [вставь задачу]. Не давай сразу ответ — объясни логику решения по шагам, чтобы я понял метод."},
  {tab:"для всех",cat:"учёба",title:"Сделать шпаргалку",text:"Сделай краткую шпаргалку по теме '[тема]' — только самое важное, без воды. Формат: ключевые понятия + одно предложение объяснения каждого."},
  {tab:"для всех",cat:"учёба",title:"Сравнить две теории",text:"Объясни в чём разница между [теория 1] и [теория 2]. Когда применяется каждая? Приведи пример для каждой."},
  {tab:"для всех",cat:"учёба",title:"Написать реферат",text:"Напиши структуру реферата по теме '[тема]'. Что должно быть в каждом разделе и какие источники стоит искать?"},
  {tab:"для всех",cat:"учёба",title:"Выучить иностранные слова",text:"Я хочу запомнить эти слова на [язык]: [список слов]. Придумай для каждого ассоциацию или мнемонику которая поможет их запомнить."},
  {tab:"для всех",cat:"учёба",title:"Проверить знания",text:"Я изучаю тему '[тема]'. Задай мне 10 вопросов разной сложности чтобы проверить насколько я её понял."},
  {tab:"для всех",cat:"учёба",title:"Пересказать книгу",text:"Коротко перескажи содержание книги '[название]'. Главные идеи, ключевые моменты, основные выводы."},
  {tab:"для всех",cat:"учёба",title:"Помочь с дипломом",text:"Я пишу дипломную работу по теме '[тема]'. Помоги составить план: структуру глав, что должно быть в каждой и как сформулировать цель и задачи."},
  {tab:"для всех",cat:"учёба",title:"Объяснить формулу",text:"Объясни что означает эта формула и как ею пользоваться: [вставь формулу]. Приведи простой числовой пример."},
  // РАБОТА
  {tab:"для всех",cat:"работа",title:"Написать письмо",text:"Напиши вежливое письмо [кому] с просьбой [что]. Тон — деловой, но дружелюбный. Письмо должно быть коротким, не больше 5 предложений."},
  {tab:"для всех",cat:"работа",title:"Подготовиться к собеседованию",text:"Я иду на собеседование на позицию [должность]. Задавай мне типичные вопросы по одному и давай обратную связь на мои ответы."},
  {tab:"для всех",cat:"работа",title:"Улучшить текст",text:"Улучши этот текст: сделай его понятнее, убери лишнее, исправь ошибки. Сохрани мой смысл и стиль: [вставь текст]"},
  {tab:"для всех",cat:"работа",title:"Придумать идеи",text:"Придумай 10 идей для [задача/проект]. Идеи должны быть разными — от простых до нестандартных. Коротко объясни каждую."},
  {tab:"для всех",cat:"работа",title:"Составить резюме",text:"Помоги составить резюме для позиции [должность]. Мой опыт: [опиши коротко]. Сделай его кратким, понятным и убедительным."},
  {tab:"для всех",cat:"работа",title:"Подготовить презентацию",text:"Помоги структурировать презентацию на тему '[тема]' для [аудитория]. Сколько слайдов, что на каждом, с чего начать чтобы сразу захватить внимание."},
  {tab:"для всех",cat:"работа",title:"Ответить на негативный отзыв",text:"Мне оставили негативный отзыв: '[текст отзыва]'. Помоги написать вежливый профессиональный ответ который признаёт проблему но защищает репутацию."},
  {tab:"для всех",cat:"работа",title:"Придумать название",text:"Придумай 10 вариантов названия для [что: продукт/проект/компания]. Оно должно быть коротким, запоминающимся и отражать суть. Объясни идею каждого."},
  {tab:"для всех",cat:"работа",title:"Написать коммерческое предложение",text:"Напиши короткое коммерческое предложение для [клиент] о [услуга/продукт]. Выдели главную выгоду и закончи призывом к действию."},
  {tab:"для всех",cat:"работа",title:"Делегировать задачу",text:"Помоги сформулировать задачу для [кому: коллега/подрядчик]. Задача: [опиши]. Что важно указать чтобы человек всё понял и сделал правильно?"},
  {tab:"для всех",cat:"работа",title:"Написать скрипт для звонка",text:"Напиши скрипт телефонного разговора. Я звоню [кому] чтобы [цель]. Включи приветствие, суть, обработку возражения 'нет времени' и завершение."},
  {tab:"для всех",cat:"работа",title:"Сформулировать цели",text:"Помоги сформулировать цели по методу SMART для [задача/проект]. Мои идеи: [опиши размыто]. Сделай их конкретными, измеримыми и реалистичными."},
  // БЫТ
  {tab:"для всех",cat:"быт",title:"Рецепт из того что есть",text:"У меня в холодильнике есть: [список продуктов]. Придумай простое блюдо которое можно из этого приготовить. Напиши рецепт по шагам."},
  {tab:"для всех",cat:"быт",title:"Список покупок на неделю",text:"Я хочу готовить дома на неделю для [кол-во человек]. Составь список покупок на 5 недорогих блюд с учётом что некоторые продукты можно использовать в нескольких рецептах."},
  {tab:"для всех",cat:"быт",title:"Разобраться с документом",text:"Объясни мне этот документ простыми словами. Что от меня требуется и на что обратить особое внимание: [вставь текст документа]"},
  {tab:"для всех",cat:"быт",title:"Распланировать день",text:"Помоги распланировать мой день. Вот мои задачи: [список]. Время с [от] до [до]. Расставь приоритеты и предложи порядок."},
  {tab:"для всех",cat:"быт",title:"Разобраться с поломкой",text:"У меня сломалось [что]. Симптомы: [опиши]. Подскажи возможные причины и что можно попробовать починить самому до вызова мастера."},
  {tab:"для всех",cat:"быт",title:"Сравнить товары",text:"Помоги выбрать между [товар 1] и [товар 2]. Моя задача: [для чего]. Бюджет: [сумма]. Что важнее учесть при выборе?"},
  {tab:"для всех",cat:"быт",title:"Собрать чемодан",text:"Я еду в [куда] на [сколько дней]. Погода: [опиши]. Цель поездки: [отдых/работа/другое]. Составь список что взять, ничего важного не забыть."},
  {tab:"для всех",cat:"быт",title:"Написать объявление",text:"Напиши объявление о продаже [что]. Характеристики: [опиши]. Цена: [сумма]. Текст должен быть коротким, честным и привлекательным."},
  {tab:"для всех",cat:"быт",title:"Разобраться с коммуналкой",text:"Объясни мне эту строку в квитанции ЖКХ: [что непонятно]. Почему так начисляется и имею ли я право это оспорить?"},
  {tab:"для всех",cat:"быт",title:"Придумать меню на праздник",text:"Помоги составить меню для [праздник] на [кол-во гостей]. Бюджет: [сумма]. Учти что среди гостей есть [особенности: вегетарианцы/дети/другое]."},
  {tab:"для всех",cat:"быт",title:"Организовать переезд",text:"Мне предстоит переезд. Составь чеклист — что сделать за месяц, за неделю, за день и в день переезда."},
  {tab:"для всех",cat:"быт",title:"Найти подешевле",text:"Я хочу купить [что]. Бюджет: [сумма]. Подскажи на что обращать внимание при выборе и как найти лучшее соотношение цена/качество."},
  // ЗДОРОВЬЕ
  {tab:"для всех",cat:"здоровье",title:"Понять симптомы",text:"У меня есть следующие симптомы: [список]. Что это может быть? Объясни возможные причины и скажи когда точно стоит идти к врачу. Не ставь диагноз — только информация."},
  {tab:"для всех",cat:"здоровье",title:"Составить тренировку",text:"Составь тренировку на [сколько минут] для [цель: похудение/тонус/сила] без специального оборудования. Уровень — начинающий."},
  {tab:"для всех",cat:"здоровье",title:"Разобраться в анализах",text:"Объясни простыми словами что означают эти результаты анализов: [вставь результаты]. Какие показатели выходят за норму и стоит ли беспокоиться?"},
  {tab:"для всех",cat:"здоровье",title:"Составить режим дня",text:"Помоги составить здоровый режим дня. Я встаю в [время], ложусь в [время], работаю/учусь с [время] до [время]. Учти сон, питание, движение."},
  {tab:"для всех",cat:"здоровье",title:"Разобраться с питанием",text:"Я хочу питаться здоровее но не знаю с чего начать. Мои ограничения: [аллергии/предпочтения]. Дай 5 простых советов которые реально внедрить с завтрашнего дня."},
  {tab:"для всех",cat:"здоровье",title:"Объяснить лекарство",text:"Объясни простыми словами для чего это лекарство и как правильно его принимать: [название]. На что обратить внимание и какие есть противопоказания?"},
  {tab:"для всех",cat:"здоровье",title:"Подготовиться к врачу",text:"Я иду к врачу с проблемой: [опиши]. Какие вопросы стоит задать врачу? Что важно рассказать и о чём не забыть упомянуть?"},
  {tab:"для всех",cat:"здоровье",title:"Улучшить сон",text:"Я плохо сплю — [опиши проблему: долго засыпаю/просыпаюсь ночью/другое]. Дай конкретные советы которые можно попробовать уже сегодня ночью."},
  {tab:"для всех",cat:"здоровье",title:"Снизить вес",text:"Я хочу похудеть на [кол-во кг] за [срок]. Мой образ жизни: [опиши активность]. С чего начать и каких простых правил придерживаться?"},
  // ОБЩЕНИЕ
  {tab:"для всех",cat:"общение",title:"Ответить на сложное сообщение",text:"Мне написали вот это: [сообщение]. Помоги составить ответ. Я хочу [что хочешь донести]. Тон должен быть [спокойным / уверенным / дружелюбным]."},
  {tab:"для всех",cat:"общение",title:"Разрешить конфликт",text:"У меня конфликт с [кем]. Ситуация такая: [опиши]. Как мне лучше поговорить с этим человеком? Что сказать и чего избегать?"},
  {tab:"для всех",cat:"общение",title:"Попросить об одолжении",text:"Мне нужно попросить [кого] о [что]. Помоги сформулировать просьбу так чтобы это звучало естественно и не неловко."},
  {tab:"для всех",cat:"общение",title:"Познакомиться с человеком",text:"Хочу познакомиться с [кем: коллегой/соседом/человеком на мероприятии]. Предложи несколько естественных способов начать разговор без неловкости."},
  {tab:"для всех",cat:"общение",title:"Отказать вежливо",text:"Мне нужно отказать [кому] в [чём]. Помоги сформулировать отказ так чтобы не обидеть человека и не испортить отношения."},
  {tab:"для всех",cat:"общение",title:"Извиниться искренне",text:"Мне нужно извиниться перед [кем] за [что]. Помоги написать искреннее извинение которое не звучит как отговорка."},
  {tab:"для всех",cat:"общение",title:"Дать обратную связь",text:"Мне нужно дать обратную связь [кому] по поводу [что]. Это нужно сказать честно но не обидно. Помоги сформулировать."},
  {tab:"для всех",cat:"общение",title:"Написать в поддержку",text:"Помоги написать обращение в службу поддержки [компания]. Проблема: [опиши]. Текст должен быть чётким, вежливым и с конкретным запросом."},
  // ТВОРЧЕСТВО
  {tab:"для всех",cat:"творчество",title:"Придумать подарок",text:"Помоги придумать подарок для [кому] на [повод]. Бюджет: [сумма]. Расскажи немного об этом человеке: [пару слов]. Предложи 5 вариантов от простого к оригинальному."},
  {tab:"для всех",cat:"творчество",title:"Написать поздравление",text:"Напиши поздравление с [праздник] для [кому]. Тон — [весёлый / трогательный / официальный]. Не банальное, живое. 3-4 предложения."},
  {tab:"для всех",cat:"творчество",title:"Придумать историю",text:"Придумай короткую историю (5-7 предложений) в жанре [жанр] с главным героем [кто]. Начало должно сразу захватывать."},
  {tab:"для всех",cat:"творчество",title:"Придумать имя персонажу",text:"Придумай имя для персонажа: [пол], [возраст], [характер], [сеттинг: современность/фэнтези/другое]. Предложи 5 вариантов с объяснением почему каждое подходит."},
  {tab:"для всех",cat:"творчество",title:"Написать пост в соцсети",text:"Напиши пост для [Instagram/ВКонтакте/Telegram] на тему '[тема]'. Тон — [живой/вдохновляющий/информационный]. Добавь призыв к действию в конце."},

const allTabs=["все",...new Set(data.map(d=>d.tab))];
function getCats(tab){return["все",...new Set(data.filter(d=>tab==="все"||d.tab===tab).map(d=>d.cat))];}
let activeTab="все",activeCat="все";

function render(){
  const q=document.getElementById("q").value.toLowerCase();
  const filtered=data.filter(d=>
    (activeTab==="все"||d.tab===activeTab)&&
    (activeCat==="все"||d.cat===activeCat)&&
    (d.title.toLowerCase().includes(q)||d.text.toLowerCase().includes(q))
  );
  document.getElementById("tabs").innerHTML=allTabs.map(t=>
    `<div class="tab${activeTab===t?" active":""}" onclick="setTab('${t}')">${t}</div>`
  ).join("");
  document.getElementById("cats").innerHTML=getCats(activeTab).map(c=>
    `<div class="cat${activeCat===c?" active":""}" onclick="setCat('${c}')">${c==="все"?"все категории":c}</div>`
  ).join("");
  document.getElementById("count").textContent=`${filtered.length} промптов`;
  const cards=document.getElementById("cards");
  if(!filtered.length){cards.innerHTML='<div class="empty">Ничего не найдено</div>';return;}
  cards.innerHTML=filtered.map((d,i)=>`<div class="card">
    <div class="card-top"><span class="card-title">${d.title}</span><span class="badge ${d.cat}">${d.cat}</span></div>
    <div class="card-text">${d.text}</div>
    <button class="copy-btn" id="btn${i}" onclick="copy(${i})">копировать</button>
  </div>`).join("");
}
function setTab(t){activeTab=t;activeCat="все";render();}
function setCat(c){activeCat=c;render();}
function copy(i){
  const q=document.getElementById("q").value.toLowerCase();
  const filtered=data.filter(d=>
    (activeTab==="все"||d.tab===activeTab)&&
    (activeCat==="все"||d.cat===activeCat)&&
    (d.title.toLowerCase().includes(q)||d.text.toLowerCase().includes(q))
  );
  navigator.clipboard.writeText(filtered[i].text);
  const btn=document.getElementById("btn"+i);
  btn.textContent="скопировано ✓";btn.classList.add("copied");
  setTimeout(()=>{btn.textContent="копировать";btn.classList.remove("copied")},2000);
}
render();
</script>
